<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>Read.</title>
    <link href="img/favicon.png" rel="icon">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="font/remixicon.css">
	<link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="logo">Read.</span>
            <i class="ri-arrow-right-long-line close-sidebar"></i>
        </div>
        <div class="sidebar-content">
            <div class="sidebar-menu">
                <p class="about-title">安于闲，乐于独</p>
                <p class="about-content">一歌，一句，一文<br>躲藏在时光背后的无尽地带<br></p>
            </div>
            <div class="sidebar-menu">
                <div class="menu-item"><i class="ri-heart-2-line"></i> 我的收藏</div>
                <div class="menu-item"><i class="ri-mail-line"></i> 联系我们<span class="mail">cveyo@qq.com</span></div>
                <div id="changelog-trigger" class="menu-item"><i class="ri-history-line"></i> 更新日志</div>
                <div class="menu-item"><i class="ri-upload-line"></i> 当前版本<span class="version">V0.0.1</span></div>
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="state">
                <p>本站部分素材来自网络收集，侵权请联系删除</p>
            </div>
        </div>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="page-content">
        <nav class="top-nav">
            <div class="logo-area">
                <div class="menu">
                    <a><span class="menu-bar"></span><span class="menu-bar"></span></a>
                </div>
                <nav class="nav-container">
                    <div class="nav-menu">
                        <div class="highlight"></div>
                        <a class="nav-item" data-target="music">音乐</a>
                        <a class="nav-item" data-target="sentence">句子</a>
                        <a class="nav-item" data-target="article">文章</a>
                    </div>
                </nav>
                <span class="date-box">
                    <a class="date-year" id="timeline-trigger">2025.2.<span class="date-day">27<span class="date-tag"></span></span></a>
                </span>
            </div>
        </nav>

        <div class="card-container">
            <!-- 音乐卡片 -->
            <div class="card" id="music">
                <div class="card-inner">
                    <div id="album-box">
                        <div class="album-image">
                            <img src="" class="active" id="album-img" alt="音乐封面">
                        </div>
                    </div>
                    <div class="player-control-wrapper">
                        <div class="progress-bar">
                            <div class="progress-fill"></div>
                        </div>
                        <div class="player-info-overlay">
                            <div class="track-info">
                                <p class="track-album"></p>
                                <p class="track-singer"></p>
                            </div>
                            <div class="play-pause-icon pause">
                                <i class="ri-play-circle-line pause-icon"></i>
                                <i class="ri-pause-circle-line play-icon"></i>
                            </div>
                        </div>
                    </div>
                    <audio id="audio-source" src="" style="display: none;"></audio>
                </div>
                <div class="stats-actions" data-type="music">
                    <button class="favorite-btn"><i class="ri-heart-2-line"></i> <span class="count">0</span></button>
                    <button class="share-btn"><i class="ri-share-2-line"></i> <span class="count">0</span></button>
                </div>
            </div>

            <!-- 句子卡片 -->
            <div class="card" id="sentence">
                <div class="card-inner">
                    <div class="sentence-image" id="sentenceImageContainer" style="display: none;">
                        <img src="" alt="句子配图" id="sentenceImg">
                    </div>
                    <p id="sentenceText"></p>
                    <p class="from"><span></span></p>
                </div>
                <div class="stats-actions" data-type="sentence">
                    <button class="favorite-btn"><i class="ri-heart-2-line"></i> <span class="count">0</span></button>
                    <button class="share-btn"><i class="ri-share-2-line"></i> <span class="count">0</span></button>
                </div>
            </div>

            <!-- 文章卡片 -->
            <div class="card" id="article">
                <div class="card-inner">
                    <div class="bg-img"><img src="" alt="文章配图" id="article-img"></div>
                    <div class="article-info">
                        <p class="title" id="article-title"></p>
                        <p class="theauthor" id="article-author"></p>
                        <div class="article"><p id="article-content"></p></div>
                    </div>
                </div>
                <div class="stats-actions" data-type="article">
                    <button class="favorite-btn"><i class="ri-heart-2-line"></i> <span class="count">0</span></button>
                    <button class="share-btn"><i class="ri-share-2-line"></i> <span class="count">0</span></button>
                </div>
            </div>
        </div>

        <!-- 时间轴弹窗 -->
        <div class="timeline-modal" id="timelineOverlay">
            <div class="timeline-modal-content">
                <div class="timeline-header">
                    <i class="ri-arrow-left-long-line close-timeline"></i>
                </div>
                <div class="timeline-body">
                    <div class="timeline-left">
                        <ul class="month-list"></ul>
                    </div>
                    <div class="timeline-right">
                        <div class="date-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
	
    <!-- 收藏页面模态框 -->
    <div class="favorites-modal" id="favoritesModal">
        <div class="favorites-modal-content">
            <div class="favorites-header">
                <i class="ri-arrow-left-long-line close-favorites"></i>
                <h3>我的收藏</h3>
            </div>
            <div class="favorites-body" id="favoritesBody">
                <div class="loading-state">
                    <i class="ri-loader-4-line"></i> 加载收藏中...
                </div>
            </div>
        </div>
    </div>

    <!-- 更新日志模态框 -->
    <div class="changelog-modal" id="changelogModal">
        <div class="changelog-modal-content">
            <div class="changelog-header">
                <i class="ri-arrow-left-long-line close-changelog"></i>
                <h3>更新日志</h3>
            </div>
            <div class="changelog-body" id="changelogBody">
                <div class="loading-state">
                    <i class="ri-loader-4-line"></i> 加载中...
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
